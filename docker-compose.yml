services:
  postgres:
    image: postgres:16-alpine
    container_name: customer-registration-db

    restart: unless-stopped

    ports:
      - '5432:5432'

    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: customer_registration

    volumes:
      - postgres16-data:/var/lib/postgresql/data

volumes:
  postgres16-data:
